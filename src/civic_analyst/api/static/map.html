<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Toronto Civic Risk Analyst</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/static/vendor/maplibre-gl.css" />
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; overflow-x: hidden; }
    /* Fully offline: vector basemap from a self-hosted PMTiles file (no tile servers). */
    #map { position: absolute; top: 0; bottom: 0; left: 0; width: 70vw; background: #0b1220; }
    #panel { position: absolute; top: 0; bottom: 0; right: 0; width: 30vw; min-width: 320px;
             overflow-y: auto; box-sizing: border-box; padding: 16px; background: #0f172a;
             color: #e2e8f0; }
    #panel h1 { font-size: 18px; margin: 0 0 4px; }
    #panel h2 { font-size: 13px; margin: 16px 0 6px; color: #94a3b8; font-weight: 600;
                text-transform: uppercase; letter-spacing: .05em; }
    #addr-h { font-size: 22px; margin: 2px 0 0; color: #f1f5f9; }   /* address = the headline */
    .hint { color: #94a3b8; font-size: 13px; }
    .scorewrap { display: flex; align-items: baseline; gap: 10px; margin: 14px 0 0; }
    #score { font-size: 44px; font-weight: 700; line-height: 1; }
    #score .scale { font-size: 16px; font-weight: 600; color: #64748b; }
    .scorecap { font-size: 12px; color: #94a3b8; }
    .band { font-size: 13px; font-weight: 700; letter-spacing: .04em; margin-top: 2px; }
    #claims li { margin: 6px 0; font-size: 13px; }
    .agentcap { font-size: 12px; color: #64748b; margin-top: 4px; }
    .back { background: none; border: 1px solid #334155; color: #cbd5e1; border-radius: 6px;
            padding: 3px 8px; font-size: 12px; cursor: pointer; margin-bottom: 8px; }
    /* Legend — explains the shape + color encoding once. */
    #legend { list-style: none; display: flex; flex-wrap: wrap; gap: 10px; margin: 8px 0 0;
              padding: 0; font-size: 12px; }
    #legend li { white-space: nowrap; }
    /* Accessible address list — keyboard/screen-reader entry point alongside the pins. */
    #addrnav { max-height: 38vh; overflow-y: auto; }
    #addrlist { list-style: none; margin: 0; padding: 0; }
    #addrlist button { display: flex; gap: 8px; align-items: baseline; width: 100%;
      text-align: left; background: #111c33; color: #e2e8f0; border: 1px solid #1e293b;
      border-radius: 6px; padding: 6px 8px; margin: 3px 0; font-size: 13px; cursor: pointer; }
    #addrlist button:hover { border-color: #64748b; }
    #addrlist button[aria-current="true"] { border-color: #38bdf8; background: #14233f; }
    .sym { font-size: 13px; }
    .bandlbl { font-weight: 700; font-size: 11px; min-width: 34px; }
    .band-high  .sym, .band-high  .bandlbl, .b-high  { color: #f87171; }
    .band-medium .sym, .band-medium .bandlbl, .b-medium { color: #fbbf24; }
    .band-low   .sym, .band-low   .bandlbl, .b-low   { color: #facc15; }
    .band-none  .sym, .band-none  .bandlbl, .b-none  { color: #4ade80; }
    .verify { color: #4ade80; cursor: pointer; font-size: 11px; white-space: nowrap;
      background: none; border: 1px solid #14532d; border-radius: 4px; padding: 1px 6px; }
    .verify[aria-expanded="true"] { background: #14532d; color: #dcfce7; }
    .srcline { color: #94a3b8; font-size: 12px; margin: 3px 0 6px 12px;
               border-left: 2px solid #334155; padding-left: 8px; }
    .nomatch { border: 1px solid #b45309; background: #2a1c08; border-radius: 8px;
               padding: 12px; margin-top: 12px; }
    .nomatch .nm-h { color: #fbbf24; font-weight: 700; margin-bottom: 4px; }
    /* Hero quick-jumps + City Digest controls. */
    .quickrow { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 0; }
    .chip { background: #111c33; color: #e2e8f0; border: 1px solid #1e293b; border-radius: 999px;
            padding: 4px 10px; font-size: 12px; cursor: pointer; }
    .chip:hover { border-color: #64748b; }
    .chip.digest { background: #14233f; border-color: #38bdf8; color: #bae6fd; font-weight: 600; }
    #digest-out { margin-top: 8px; }
    .digest-brief { font-size: 13px; line-height: 1.5; color: #cbd5e1; background: #111c33;
                    border: 1px solid #1e293b; border-radius: 8px; padding: 10px 12px; }
    #digest-rank { list-style: none; margin: 8px 0 0; padding: 0; }
    #digest-rank li { display: flex; gap: 8px; align-items: baseline; font-size: 13px; margin: 3px 0; }
    #digest-rank .rk-score { font-weight: 700; min-width: 40px; }
    #digest-rank button { background: none; border: none; color: #93c5fd; cursor: pointer;
                          padding: 0; font: inherit; text-align: left; text-decoration: underline; }
    .err { border: 1px solid #b45309; background: #2a1c08; color: #fbbf24; border-radius: 8px;
           padding: 10px 12px; font-size: 13px; }
    .spinner { display: inline-block; width: 12px; height: 12px; margin-right: 6px;
               border: 2px solid #334155; border-top-color: #38bdf8; border-radius: 50%;
               animation: spin .8s linear infinite; vertical-align: -1px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Evidence rows — every linked source record; licences are neutral identity context. */
    #evlist { list-style: none; margin: 6px 0 0; padding: 0; }
    #evlist li { font-size: 12px; margin: 4px 0; padding: 5px 8px; border-radius: 6px;
                 background: #111c33; border-left: 3px solid #334155; color: #cbd5e1; }
    #evlist li.ev-permit { border-left-color: #60a5fa; }
    #evlist li.ev-inspection { border-left-color: #f87171; }
    #evlist li.ev-licence { border-left-color: #475569; }   /* neutral: identity, not risk */
    .ev-kind { font-weight: 700; text-transform: uppercase; letter-spacing: .03em; font-size: 10px;
               margin-right: 6px; }
    .ev-permit .ev-kind { color: #93c5fd; }
    .ev-inspection .ev-kind { color: #fca5a5; }
    .ev-licence .ev-kind { color: #94a3b8; }
    .ev-meta { color: #94a3b8; }
    /* Visible, high-contrast focus ring on every interactive element. */
    a:focus-visible, button:focus-visible, [tabindex]:focus-visible {
      outline: 2px solid #38bdf8; outline-offset: 2px; }
    .skip { position: absolute; left: -9999px; top: 0; z-index: 5; }
    .skip:focus { left: 8px; top: 8px; background: #0f172a; color: #e2e8f0; padding: 8px 12px;
      border: 1px solid #38bdf8; border-radius: 6px; }
    /* Responsive: below tablet width, stack the panel under the map (no clipping/scroll). */
    @media (max-width: 900px) {
      #map { position: static; width: 100%; height: 44vh; }
      #panel { position: static; width: 100%; min-width: 0; height: auto; }
      #addrnav { max-height: none; }
    }
  </style>
</head>
<body>
  <a href="#panel" class="skip">Skip to analysis</a>
  <div id="map"></div>
  <div id="panel" role="complementary" aria-label="Risk analysis" tabindex="-1">
    <h1>Toronto Civic Risk Analyst</h1>
    <p class="hint">100% on-device · offline vector map · pick an address or a map pin</p>
    <ul id="legend" aria-label="Risk legend">
      <li class="b-high">▲ High</li><li class="b-medium">◆ Medium</li>
      <li class="b-low">● Low</li><li class="b-none">· OK</li>
    </ul>
    <div id="status" class="hint" role="status" aria-live="polite">Loading addresses…</div>
    <h2>Hero pins</h2>
    <div class="quickrow" id="herorow" aria-label="Jump to a hero address">
      <button type="button" class="chip hero" data-label="500 BLOOR ST W">500 Bloor St W</button>
      <button type="button" class="chip hero" data-label="85 FRONT ST E">85 Front St E</button>
      <button type="button" class="chip hero" data-label="409 SPADINA AVE">409 Spadina Ave</button>
    </div>
    <h2>City digest</h2>
    <div class="quickrow">
      <button type="button" class="chip digest" id="digest-btn"
              aria-controls="digest-out" aria-expanded="false">▸ Generate city briefing</button>
    </div>
    <div id="digest-out" aria-live="polite"></div>
    <div id="detail" aria-live="polite"></div>
    <h2 id="addrhead" hidden>Browse addresses by risk</h2>
    <nav id="addrnav" aria-label="Addresses by risk"><ul id="addrlist"></ul></nav>
  </div>
  <script src="/static/vendor/maplibre-gl.js"></script>
  <script src="/static/vendor/pmtiles.js"></script>
  <script>
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol('pmtiles', protocol.tile);
    const PMTILES = `pmtiles://${location.origin}/static/toronto.pmtiles`;

    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g,
      (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    // Risk band: a non-color cue (shape + word) so risk isn't conveyed by color alone.
    const BANDS = {
      high:   { sym: '▲', label: 'HIGH' },
      medium: { sym: '◆', label: 'MED' },
      low:    { sym: '●', label: 'LOW' },
      none:   { sym: '·', label: 'OK' },
    };
    const bandOf = (r) => r >= 0.67 ? 'high' : r >= 0.34 ? 'medium' : r > 0 ? 'low' : 'none';
    let ADDR_ROWS = [];

    const map = new maplibregl.Map({
      container: 'map',
      center: [-79.3845, 43.6510],
      zoom: 13.4,
      attributionControl: { compact: true },
      style: {
        version: 8,
        sources: { proto: { type: 'vector', url: PMTILES, attribution: '© OpenStreetMap' } },
        layers: [
          { id: 'bg', type: 'background', paint: { 'background-color': '#0b1220' } },
          { id: 'earth', source: 'proto', 'source-layer': 'earth', type: 'fill', paint: { 'fill-color': '#172033' } },
          { id: 'landcover', source: 'proto', 'source-layer': 'landcover', type: 'fill', paint: { 'fill-color': '#15301f', 'fill-opacity': 0.4 } },
          { id: 'landuse', source: 'proto', 'source-layer': 'landuse', type: 'fill', paint: { 'fill-color': '#15301f', 'fill-opacity': 0.7 } },
          { id: 'water', source: 'proto', 'source-layer': 'water', type: 'fill', paint: { 'fill-color': '#0e2a4a' } },
          { id: 'roads', source: 'proto', 'source-layer': 'roads', type: 'line',
            paint: { 'line-color': '#3a4a66', 'line-width': ['interpolate', ['linear'], ['zoom'], 10, 0.4, 14, 1.5, 16, 4] } },
          { id: 'buildings', source: 'proto', 'source-layer': 'buildings', type: 'fill', minzoom: 13.5, paint: { 'fill-color': '#212d44' } }
        ]
      }
    });
    map.addControl(new maplibregl.NavigationControl());
    addEventListener('resize', () => map.resize());

    const hoverPopup = new maplibregl.Popup({ closeButton: false, closeOnClick: false, offset: 12 });

    function setSelected(label) {
      const row = ADDR_ROWS.find((a) => a.label === label);
      const data = row
        ? { type: 'FeatureCollection', features: [{ type: 'Feature',
            geometry: { type: 'Point', coordinates: [row.lng, row.lat] }, properties: {} }] }
        : { type: 'FeatureCollection', features: [] };
      if (map.getSource('selected')) map.getSource('selected').setData(data);
    }

    function srcText(s) {
      const bits = [`source ${esc(s.tag)}`, `[${esc(s.dataset)}]`, esc(s.kind)];
      if (s.detail) bits.push('— ' + esc(s.detail));
      if (s.ref) bits.push('· #' + esc(s.ref));       // real record id — traceable (#5)
      if (s.date) bits.push('· ' + esc(s.date));
      return '↳ ' + bits.join(' ');
    }

    function resetOverview() {
      document.getElementById('detail').innerHTML =
        '<p class="hint">Select a pin or an address to see its risk read.</p>';
      document.querySelectorAll('#addrlist button').forEach((b) => b.removeAttribute('aria-current'));
      setSelected(null);
    }

    async function analyze(address) {
      const detail = document.getElementById('detail');
      detail.innerHTML = '<p class="hint">Analyzing ' + esc(address) + '…</p>';
      const d = await (await fetch('/analyze?address=' + encodeURIComponent(address))).json();
      document.querySelectorAll('#addrlist button').forEach((b) =>
        b.setAttribute('aria-current', String(b.dataset.label === address)));
      setSelected(address);

      // Not-found is NOT an all-clear: show a distinct state, never a 0 score (#2).
      if (!d.found) {
        detail.innerHTML =
          '<button class="back" type="button" onclick="resetOverview()">← Overview</button>' +
          '<div class="nomatch" role="alert"><div class="nm-h">⚠ No match</div>' +
          '<p class="hint">“' + esc(d.address) + '” was not found in the fused datasets ' +
          '(Building Permits, DineSafe, Business Licences). This is <b>not</b> an all-clear — ' +
          'check the spelling/street type or pick an address from the list.</p></div>';
        return;
      }

      const band = BANDS[d.risk_band] || BANDS.none;
      const claims = (d.claims || []).map((c, i) => {
        const s = c.source;
        if (!s) return '<li>' + esc(c.text) + '</li>';
        const id = 'src' + i;
        return '<li>' + esc(c.text) +
          ' <button class="verify" type="button" aria-expanded="false" aria-controls="' + id +
          '" data-target="' + id + '">✓ verify</button>' +
          '<div id="' + id + '" class="srcline" hidden>' + srcText(s) + '</div></li>';
      }).join('');

      const shown = (d.evidence || []).length, total = d.evidence_total ?? shown;
      const evNote = total > shown
        ? 'Showing ' + shown + ' of ' + total + ' linked source records.'   // no silent cap (#3)
        : total + ' linked source record' + (total === 1 ? '' : 's') + '.';
      const agents = (d.findings || []).map((f) => esc(f.agent)).join(' + ');

      // Full evidence list: render every linked record by dataset/kind. Licences are
      // neutral identity context (grey, not high-risk) — generic so any kind renders cleanly.
      const evItems = (d.evidence || []).map((e) => {
        const kind = String(e.kind || 'record').toLowerCase();
        const meta = [e.detail, e.ref ? '#' + e.ref : '', e.date]
          .filter(Boolean).map(esc).join(' · ');
        return '<li class="ev-' + esc(kind) + '">' +
          '<span class="ev-kind">' + esc(kind) + '</span>' +
          '<span>' + esc(e.dataset) + '</span>' +
          (meta ? ' <span class="ev-meta">— ' + meta + '</span>' : '') + '</li>';
      }).join('');
      const evBlock = evItems
        ? '<h2>Linked source records</h2><ul id="evlist">' + evItems + '</ul>'
        : '';

      detail.innerHTML =
        '<button class="back" type="button" onclick="resetOverview()">← Overview</button>' +
        '<h2 id="addr-label" hidden>Address</h2>' +
        '<div id="addr-h">' + esc(d.matched_address || d.address) + '</div>' +
        '<div class="scorewrap"><div id="score" class="b-' + d.risk_band +
        '" role="img" aria-label="Risk score ' + d.risk_score + ' out of 1, ' + band.label +
        '">' + d.risk_score + '<span class="scale"> / 1</span></div>' +
        '<div><div class="band b-' + d.risk_band + '">' + band.sym + ' ' + band.label +
        ' RISK</div><div class="scorecap">Risk score (0–1)</div></div></div>' +
        '<h2>Assessment <span class="hint" style="text-transform:none;letter-spacing:0">' +
        '(verify each claim against its source)</span></h2>' +
        '<ul id="claims">' + claims + '</ul>' +
        '<p class="hint">' + evNote + '</p>' +
        evBlock +
        '<p class="agentcap">Analyzed by ' + agents + ' sub-agents · deterministic score</p>';
    }

    // Toggle (not one-way reveal) the source line, with label + ARIA state (#9, #10).
    document.getElementById('detail').addEventListener('click', (e) => {
      const btn = e.target.closest('.verify');
      if (!btn) return;
      const row = document.getElementById(btn.dataset.target);
      const open = row.hasAttribute('hidden');
      row.toggleAttribute('hidden', !open);
      btn.setAttribute('aria-expanded', String(open));
      btn.textContent = open ? '✕ hide' : '✓ verify';
    });
    addEventListener('keydown', (e) => { if (e.key === 'Escape') resetOverview(); });

    // Hero quick-jumps: reuse the existing analyze() flow; pan to the pin if it's geocoded.
    document.getElementById('herorow').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-label]');
      if (!btn) return;
      const label = btn.dataset.label;
      const row = ADDR_ROWS.find((a) => a.label === label);
      if (row) map.easeTo({ center: [row.lng, row.lat], zoom: Math.max(map.getZoom(), 15) });
      analyze(label);
      document.getElementById('panel').focus();
    });

    // City Digest: GET /digest (can take ~15s first call). Spinner + graceful errors;
    // never throws into the map. Ranked rows reuse the analyze() flow on click.
    const digestBtn = document.getElementById('digest-btn');
    const digestOut = document.getElementById('digest-out');
    let digestLoading = false;
    digestBtn.addEventListener('click', async () => {
      if (digestLoading) return;
      digestLoading = true;
      digestBtn.setAttribute('aria-expanded', 'true');
      digestBtn.disabled = true;
      digestOut.innerHTML =
        '<p class="hint"><span class="spinner" aria-hidden="true"></span>Generating city briefing… (first run can take ~15s)</p>';
      try {
        const res = await fetch('/digest');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const d = await res.json();
        const brief = d.digest
          ? '<div class="digest-brief">' + esc(d.digest) + '</div>'
          : '<p class="hint">No briefing text returned.</p>';
        const ranked = (d.ranked || []).slice(0, 5).map((r) => {
          const k = bandOf(r.risk_score);
          return '<li><span class="rk-score b-' + k + '">' + r.risk_score + '</span>' +
            '<button type="button" data-label="' + esc(r.label) + '">' + esc(r.label) + '</button></li>';
        }).join('');
        digestOut.innerHTML = brief +
          (ranked ? '<h2>Top 5 by risk</h2><ul id="digest-rank">' + ranked + '</ul>' : '');
      } catch (err) {
        digestOut.innerHTML = '<div class="err" role="alert">Could not load the city digest (' +
          esc(err.message) + '). The map and per-address analysis still work — try again.</div>';
      } finally {
        digestLoading = false;
        digestBtn.disabled = false;
      }
    });
    // Clicking a ranked address drives the same analyze() flow as a pin.
    digestOut.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-label]');
      if (!btn) return;
      const row = ADDR_ROWS.find((a) => a.label === btn.dataset.label);
      if (row) map.easeTo({ center: [row.lng, row.lat], zoom: Math.max(map.getZoom(), 15) });
      analyze(btn.dataset.label);
    });

    function renderAddressList(rows) {
      document.getElementById('addrhead').hidden = false;
      const ul = document.getElementById('addrlist');
      ul.innerHTML = rows.slice().sort((a, b) => b.risk_score - a.risk_score).map((a) => {
        const k = bandOf(a.risk_score), b = BANDS[k];
        return '<li><button type="button" class="addr band-' + k + '" data-label="' + esc(a.label) +
          '" aria-label="' + esc(a.label) + ', ' + b.label + ' risk, score ' + a.risk_score + '">' +
          '<span class="sym" aria-hidden="true">' + b.sym + '</span>' +
          '<span class="bandlbl">' + b.label + '</span>' +
          '<span class="lbl">' + esc(a.label) + '</span></button></li>';
      }).join('');
      ul.onclick = (e) => {
        const btn = e.target.closest('button[data-label]');
        if (btn) analyze(btn.dataset.label);
      };
    }

    map.on('load', async () => {
      const rows = await (await fetch('/addresses')).json();
      ADDR_ROWS = rows;
      const status = document.getElementById('status');
      if (!rows.length) {
        status.textContent = 'No geocoded addresses loaded. Run `make demo`.';
        return;
      }
      resetOverview();
      renderAddressList(rows);
      map.addSource('risk', {
        type: 'geojson',
        data: {
          type: 'FeatureCollection',
          features: rows.map((a) => ({
            type: 'Feature',
            properties: { label: a.label, risk: a.risk_score },
            geometry: { type: 'Point', coordinates: [a.lng, a.lat] }
          }))
        }
      });
      map.addLayer({
        id: 'risk-pins', source: 'risk', type: 'circle',
        paint: {
          'circle-radius': 9,
          'circle-color': ['step', ['get', 'risk'], '#22c55e', 0.34, '#f59e0b', 0.67, '#ef4444'],
          'circle-stroke-width': 2, 'circle-stroke-color': '#0b1220'
        }
      });
      // Selected-pin halo so the panel and map stay visually linked.
      map.addSource('selected', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      map.addLayer({
        id: 'risk-selected', source: 'selected', type: 'circle',
        paint: { 'circle-radius': 14, 'circle-color': 'rgba(56,189,248,0)',
                 'circle-stroke-width': 3, 'circle-stroke-color': '#38bdf8' }
      });
      map.on('click', 'risk-pins', (e) => analyze(e.features[0].properties.label));
      map.on('mouseenter', 'risk-pins', (e) => {
        map.getCanvas().style.cursor = 'pointer';
        const p = e.features[0].properties, k = bandOf(p.risk), b = BANDS[k];
        hoverPopup.setLngLat(e.lngLat)
          .setHTML('<b>' + esc(p.label) + '</b><br><span class="b-' + k + '">' + b.sym + ' ' +
                   b.label + ' · ' + p.risk + '</span>').addTo(map);
      });
      map.on('mouseleave', 'risk-pins', () => {
        map.getCanvas().style.cursor = ''; hoverPopup.remove();
      });
      // Set status LAST: it's the single "fully ready" signal (nothing rewrites
      // #detail after this, so an immediate analyze() can't be clobbered).
      status.textContent = rows.length + ' addresses. Click a pin or pick one below.';
    });
  </script>
</body>
</html>
